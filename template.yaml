AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: InSpline Dental Appointments - Lambda + API Gateway + DynamoDB + WebSocket

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Architectures:
      - arm64
    Environment:
      Variables:
        APPOINTMENTS_TABLE: !Ref AppointmentsTable
        APPOINTMENTS_STATUS_INDEX: status-datetime-index
        CONNECTIONS_TABLE: !Ref ConnectionsTable
        WS_API_ENDPOINT: !Sub "https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

Resources:
  AppointmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Appointments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: datetime
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: status-datetime-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: datetime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Connections
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PATCH
        AllowHeaders:
          - '*'

  AppointmentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: inspline-appointments
      CodeUri: .
      Handler: dist/lambda/appointmentsHandler.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppointmentsTable
      Events:
        PostAppointments:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /appointments
            Method: POST
        GetAppointments:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /appointments
            Method: GET
        GetAppointmentById:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /appointments/{id}
            Method: GET
        PatchTransition:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /appointments/{id}/transition
            Method: PATCH

  SeedAppointmentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: inspline-seed-appointments
      CodeUri: .
      Handler: dist/lambda/seedAppointments.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppointmentsTable

  WebSocketConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: inspline-ws-connect
      CodeUri: .
      Handler: dist/lambda/websocketHandlers.connectHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable

  WebSocketDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: inspline-ws-disconnect
      CodeUri: .
      Handler: dist/lambda/websocketHandlers.disconnectHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable

  # API Gateway WebSocket API
  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: inspline-ws
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: $request.body.action

  WebSocketApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: prod
      AutoDeploy: true

  WebSocketConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketConnectFunction.Arn}/invocations"

  WebSocketDisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketDisconnectFunction.Arn}/invocations"

  WebSocketConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      Target: !Sub "integrations/${WebSocketConnectIntegration}"

  WebSocketDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      Target: !Sub "integrations/${WebSocketDisconnectIntegration}"

  WebSocketConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebSocketConnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*/$connect"

  WebSocketDisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebSocketDisconnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*/$disconnect"

Outputs:
  HttpApiUrl:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Description: Base URL for HTTP API

  WebSocketUrl:
    Value: !Sub "wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Description: WebSocket URL for clients (VITE_WS_URL)

